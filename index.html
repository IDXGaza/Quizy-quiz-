<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>جيمي كويز - لوحة التحدي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;500;700;800;900&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --p1-red: #ef4444;
        --p2-green: #22c55e;
        --neon-cyan: #00f2ff;
        --glass-bg: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.15);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        list-style: none;
      }

      body {
        font-family: 'Cairo', sans-serif;
        background-color: #020617;
        min-height: 100vh;
        color: #f8fafc;
        overflow-x: hidden;
      }

      /* Animated Background */
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image: 
          linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(circle at center, black, transparent 80%);
      }

      /* Glassmorphism Utilities */
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }

      /* Typography Gradients */
      .text-gradient {
        background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .text-gradient-cyan {
        background: linear-gradient(135deg, #00f2ff 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Buttons */
      .btn-primary {
        background: linear-gradient(135deg, #00f2ff 0%, #0284c7 100%);
        color: white;
        border: none;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
        transform: translateY(-2px);
      }

      /* Game Board Layout */
      .game-board-area {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      /* Side Goals (Red) */
      .side-goal-path {
        display: none;
      }

      /* Top/Bottom Goals (Green) */
      .top-bottom-goals {
        display: none;
      }

      .hex-grid-center {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      .board-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: #0f172a;
        padding: 15px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        width: 100%;
      }
      
      @media (min-width: 768px) {
        .board-wrapper {
          padding: 40px;
          border-radius: 40px;
        }
      }

      /* Goal Areas inside SVG */
      .goal-area {
        transition: all 0.5s ease;
        filter: url(#scribble-filter);
      }
      .goal-area-red { fill: #ef4444; color: #ef4444; opacity: 0.4; }
      .goal-area-green { fill: #22c55e; color: #22c55e; opacity: 0.4; }
      
      .goal-area.active-turn {
        opacity: 0.9;
      }

      .hex-svg-container {
        overflow: visible;
        user-select: none;
      }

      @keyframes hex-appear {
        0% { opacity: 0; transform: scale(0) rotate(-15deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }

      .hex-group {
        animation: hex-appear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        transform-origin: center;
        transform-box: fill-box;
      }

      .hex-polygon {
        fill: #1e293b;
        stroke: #00f2ff;
        stroke-width: 2;
        transition: all 0.3s ease;
      }

      .hex-text {
        fill: #ffffff;
        font-size: 48px;
        font-weight: 900;
        text-anchor: middle;
        dominant-baseline: central;
        font-family: 'Cairo', sans-serif;
      }

      .hex-group.active-red .hex-polygon {
        fill: #ef4444 !important;
        stroke: #ffffff !important;
        stroke-width: 4;
        filter: drop-shadow(0 0 30px #ef4444);
      }
      .hex-group.active-green .hex-polygon {
        fill: #22c55e !important;
        stroke: #ffffff !important;
        stroke-width: 4;
        filter: drop-shadow(0 0 30px #22c55e);
      }

      /* New Hex Grid Styles */
      .hex-cell {
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      }

      .hex-border {
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      }

      @keyframes pulse-glow-hex {
        0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        50% { box-shadow: 0 0 30px rgba(255, 215, 0, 1); }
      }

      .animate-pulse-glow {
        animation: pulse-glow-hex 2s infinite;
      }

      @keyframes win-pulse {
        0% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.1); filter: brightness(1.5); }
        100% { transform: scale(1); filter: brightness(1); }
      }

      .animate-win-pulse {
        animation: win-pulse 1s ease-in-out infinite;
      }

      @media (max-width: 1024px) {
        .board-wrapper { padding: 30px; }
      }
      @media (max-width: 768px) {
        .game-board-area { padding: 0; }
        .board-wrapper { padding: 15px; border-radius: 20px; }
      }
      @media (max-width: 480px) {
        .board-wrapper { padding: 10px; border-radius: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
